[package]
name = "replication-engine"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
  "config",
  "membership",
  "node",
  "protocol",
  "runtime",
  "reconciliation",
  "replication", 
  "state", 
  "connection",
  "membership/src/protocols"
, "errors"]

[dependencies]
tokio = { version = "1.48.0", features = ["full"] }
log = "0.4.29"
dashmap = "6.1.0"
tracing = "0.1"
tracing-subscriber = "0.3"

runtime = { path = "./runtime" }
node = { path = "./node" }
replication = { path = "./replication" }
state = { path = "./state" }
connection = { path = "./connection" }
membership-protocols = { path = "./membership/src/protocols" }
thiserror = "2.0.18"

